<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぐそう - 画像選択パネル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            margin-top: 0;
            color: #4CAF50;
        }
        .container {
            width: 100%;
            max-width: 1200px; /* 🌟 横幅を大幅に拡大して画面を有効活用 */
            background-color: #2d2d2d;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 15px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #3b3b3b;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .btn:active {
            transform: scale(0.99);
        }
        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .image-gallery {
            display: grid;
            /* 🌟 画面幅に合わせて、横にたくさんの画像をレスポンシブに並べる */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .gallery-item {
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            background-color: #242424;
            display: flex;
            flex-direction: column;
        }
        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        .gallery-item.selected {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.4);
        }
        .gallery-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .gallery-image-wrap img {
            width: 100%;
            height: 100%;
            /* 🌟 画像を切り抜かずに、アスペクト比維持のまま全体を縮小表示 */
            object-fit: contain;
        }
        .gallery-info {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: #ccc;
            background-color: #242424;
            border-top: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .info-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 25px;
            line-height: 1.5;
            border-top: 1px solid #3d3d3d;
            padding-top: 15px;
        }

        /* 🌟 2カラムレイアウトのスタイリング */
        .content-layout {
            display: flex;
            gap: 25px;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .content-layout {
                flex-direction: column;
            }
        }
        .left-column {
            flex: 2;
        }
        .right-column {
            flex: 1;
            min-width: 320px;
        }
        .leaderboard-card {
            background-color: #242424;
            border: 1px solid #3b3b3b;
            border-radius: 8px;
            padding: 20px;
            height: 100%;
            min-height: 300px;
        }
        .leaderboard-placeholder {
            text-align: center;
        }
        .leaderboard-placeholder p {
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .leaderboard-table th {
            background-color: #1a1a1a;
            color: #888;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 2px solid #333;
        }
        .leaderboard-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #333;
            color: #ccc;
        }

        /* 🌟 詳細モーダルのスタイリング */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background-color: #ffffff; /* 背景は白 */
            color: #1e1e1e; /* 文字は黒 */
            width: 60%; /* 画面の60%くらい */
            max-width: 800px;
            min-width: 320px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (max-width: 768px) {
            .modal-content {
                width: 90%;
                padding: 20px;
            }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover {
            color: #1e1e1e;
        }
        .modal-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #f0f0f0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        .modal-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #111;
        }
        .modal-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }
        .genre-badge {
            background-color: #f0f0f0;
            color: #555;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #e0e0e0;
        }
        .modal-action {
            margin-top: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 じぐそう - 画像選択</h2>
    
    <div class="form-group">
        <label>1. ピース数を選択</label>
        <select id="pieceCount">
            <option value="24">24 ピース (かんたん)</option>
            <option value="96" selected>96 ピース (ふつう)</option>
            <option value="216">216 ピース (むずかしい)</option>
            <option value="486">486 ピース (超むずかしい)</option>
        </select>
    </div>

    <!-- 🌟 2カラムコンテンツレイアウト -->
    <div class="content-layout">
        <!-- 左カラム: ギャラリー選択 -->
        <div class="left-column">
            <div class="form-group">
                <label>2. パズルにしたい画像を選択</label>
                
                <!-- 画像ギャラリー (デフォルト画像も名前表示の新しい構造に修正) -->
                <div class="image-gallery" id="gallery">
                    <div class="gallery-item selected" onclick="selectImage(this, 'images/beer1.jpg', 'ビール缶 1', 'ビール缶 1,飲み物')">
                        <div class="gallery-image-wrap">
                            <img src="images/beer1.jpg" alt="ビール缶 1">
                        </div>
                        <div class="gallery-info">ビール缶 1</div>
                    </div>
                    <div class="gallery-item" onclick="selectImage(this, 'images/beer2.jpg', 'ビール缶 2', 'ビール缶 2,飲み物')">
                        <div class="gallery-image-wrap">
                            <img src="images/beer2.jpg" alt="ビール缶 2">
                        </div>
                        <div class="gallery-info">ビール缶 2</div>
                    </div>
                    <div class="gallery-item" onclick="selectImage(this, 'images/beer3.jpg', 'ビール缶 3', 'ビール缶 3,飲み物')">
                        <div class="gallery-image-wrap">
                            <img src="images/beer3.jpg" alt="ビール缶 3">
                        </div>
                        <div class="gallery-info">ビール缶 3</div>
                    </div>
                    <div class="gallery-item" onclick="selectImage(this, 'images/berry.jpg', 'ベリー', 'ベリー,果物')">
                        <div class="gallery-image-wrap">
                            <img src="images/berry.jpg" alt="ベリー">
                        </div>
                        <div class="gallery-info">ベリー</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右カラム: クリアタイム順位表 (準備中のプレースホルダー) -->
        <div class="right-column">
            <div class="form-group">
                <label>🏆 クリアタイム順位表</label>
                <div class="leaderboard-card">
                    <div class="leaderboard-placeholder">
                        <p>👑 タイムアタックランキング</p>
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>順位</th>
                                    <th>プレイヤー</th>
                                    <th>タイム</th>
                                    <th>ピース</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="4" style="text-align: center; color: #888; padding: 40px 10px; line-height: 1.6;">
                                        ⏱️ パズルクリア後に<br>ここにタイムが記録されます（準備中）
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-text">
        ※ Googleドライブの画像を使用する場合、対象フォルダや画像を「リンクを知っている全員に閲覧可能」に設定してください。
    </div>
</div>

<!-- 🌟 プレミアム詳細モーダル (背景白・60%サイズ) -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-image-wrap">
            <img id="modalImg" src="" alt="プレビュー">
        </div>
        <div id="modalTitle" class="modal-title">パズル画像名</div>
        <div id="modalGenres" class="modal-genres">
            <!-- 動的にジャンルバッジが挿入されます -->
        </div>
        <div class="modal-action">
            <button id="startBtn" class="btn" onclick="sendToJigsaw()">パズルを開始する！</button>
        </div>
    </div>
</div>

<script>
    // 💡 デプロイ後に発行されるGASのWebアプリURLをここに貼り付けてください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzfLQy9O6Lq4mYxTnPZKlEVc4DpMsAgqqeFJrmZw2qnH_u3ul09q5gobOYqCW8AEJTP/exec"; 

    let selectedImageUrl = 'images/beer1.jpg';
    let selectedImageName = 'ビール缶 1';
    let selectedImageDescription = 'ビール缶 1,飲み物';

    // 1. ページロード時にGASからドライブ内の画像一覧を自動取得してギャラリーを作る
    async function loadGalleryFromGAS() {
        const galleryContainer = document.getElementById('gallery');
        if (!GAS_API_URL) {
            console.log("GAS_API_URLが未設定です。ローカルのデフォルトアセットを使用します。");
            return;
        }
        galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #aaa; padding: 20px;'>ドライブから画像を読み込み中...</div>";

        try {
            const response = await fetch(`${GAS_API_URL}?action=list`);
            const data = await response.json();
            
            if (data.success && data.images.length > 0) {
                galleryContainer.innerHTML = ""; // 読み込み中表示をクリア
                
                data.images.forEach((imgInfo, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item' + (index === 0 ? ' selected' : '');
                    
                    // サムネイル画像はGoogleドライブの軽量サムネイルURLを使用 (CORS不要で表示可能)
                    const thumbUrl = `https://drive.google.com/thumbnail?sz=w200&id=${imgInfo.id}`;
                    
                    // 名前とジャンルのパース (最初は名前、それ以降は複数ジャンル)
                    let name = imgInfo.name;
                    let description = imgInfo.description || '';
                    if (description) {
                        const parts = description.split(',');
                        if (parts.length > 0 && parts[0].trim()) {
                            name = parts[0].trim();
                        }
                    } else {
                        // 拡張子を除去してきれいな名前にフォールバック
                        name = name.substring(0, name.lastIndexOf('.')) || name;
                    }
                    
                    item.innerHTML = `
                        <div class="gallery-image-wrap">
                            <img src="${thumbUrl}" alt="${name}">
                        </div>
                        <div class="gallery-info">${name}</div>
                    `;
                    
                    // クリック時に画像IDを選択状態にし、モーダルを開く
                    item.onclick = function() {
                        selectImage(this, imgInfo.id, name, description);
                    };
                    
                    galleryContainer.appendChild(item);
                    
                    // 初期選択状態として最初の画像を設定
                    if (index === 0) {
                        selectedImageUrl = imgInfo.id;
                        selectedImageName = name;
                        selectedImageDescription = description;
                    }
                });
            } else {
                galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #ff8888; padding: 20px;'>画像が見つかりませんでした。</div>";
            }
        } catch (error) {
            console.error("GASからの画像リスト取得に失敗しました:", error);
            galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #ff8888; padding: 20px;'>ギャラリーの読み込みに失敗しました。</div>";
        }
    }

    // ページロード時に自動的にGASからロード
    window.addEventListener('DOMContentLoaded', loadGalleryFromGAS);

    function selectImage(element, url, name, description) {
        // 選択表示の切り替え
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedImageUrl = url;
        selectedImageName = name;
        selectedImageDescription = description;

        // モーダルの準備と表示
        openModal(url, name, description);
    }

    function openModal(url, name, description) {
        const modal = document.getElementById('detailModal');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalGenres = document.getElementById('modalGenres');

        // ドライブ画像の場合はプレビュー用に高解像度サムネイルを使用 (sz=w800など)
        let displayUrl = url;
        if (GAS_API_URL && url && !url.startsWith('http') && !url.includes('/')) {
            displayUrl = `https://drive.google.com/thumbnail?sz=w800&id=${url}`;
        }
        
        modalImg.src = displayUrl;
        modalTitle.innerText = name;
        
        // ジャンルの生成 (最初は名前なので、2つ目以降がジャンル)
        modalGenres.innerHTML = '';
        let genres = [];
        if (description) {
            const parts = description.split(',');
            if (parts.length > 1) {
                genres = parts.slice(1).map(g => g.trim());
            }
        }
        
        if (genres.length > 0) {
            genres.forEach(genre => {
                const badge = document.createElement('span');
                badge.className = 'genre-badge';
                badge.innerText = genre;
                modalGenres.appendChild(badge);
            });
        } else {
            const badge = document.createElement('span');
            badge.className = 'genre-badge';
            badge.innerText = '一般';
            modalGenres.appendChild(badge);
        }

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    // モーダルの外側をクリックして閉じる
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    // パズル開始ボタン処理 (非同期でGAS経由でBase64をロードする)
    async function sendToJigsaw() {
        const pieceCount = document.getElementById('pieceCount').value;
        let finalUrl = selectedImageUrl;
        
        if (!finalUrl) {
            alert("画像が選択されていません。");
            return;
        }

        // 1. ボタンをローディング表示にして多重クリックを防止
        const btn = document.getElementById('startBtn');
        const originalText = btn.innerText;
        btn.innerText = "⏳ パズル画像を準備中...";
        btn.disabled = true;

        // 2. ポップアップブロックを完全に回避するため、即座にゲームプレイヤー画面を開く
        const playerWindow = window.open('jigsaw_player.html', '_blank');
        if (!playerWindow) {
            alert("ポップアップブロックが有効化されている可能性があります。別ウィンドウの許可をお願いします。");
            btn.innerText = originalText;
            btn.disabled = false;
            return;
        }

        // 親ウィンドウ側の共有変数をクリア
        window.selectedPuzzleData = null;

        try {
            let targetBase64 = null;
            
            // GAS経由での画像取得
            // GAS_API_URLが設定されていて、画像パスがURLではなく画像ID（英数字の長い文字列）である場合
            if (GAS_API_URL && finalUrl && !finalUrl.startsWith('http') && !finalUrl.includes('/')) {
                console.log("GASから安全にBase64画像データを取得します。ID:", finalUrl);
                const response = await fetch(`${GAS_API_URL}?action=image&id=${finalUrl}`);
                const resData = await response.json();
                if (resData.success) {
                    targetBase64 = resData.imageData;
                    console.log("GASからBase64画像データの取得に成功しました。");
                } else {
                    console.warn("GASからの画像取得に失敗しました:", resData.error);
                }
            }
            
            if (!targetBase64) {
                // デフォルト同居画像などのフォールバック
                targetBase64 = finalUrl;
            }

            // 3. データの準備完了！共有変数に確実に格納
            // 子ウィンドウがこの変数をポーリングで取得して自動的に進行します
            window.selectedPuzzleData = {
                imageData: targetBase64,
                pieceCount: parseInt(pieceCount, 10)
            };

            // 4. データ設定後、モーダルを閉じる
            closeModal();

        } catch (e) {
            console.error("画像データ取得処理中にエラーが発生しました:", e);
            // エラー時はフォールバックとして元のURLをそのまま渡す
            window.selectedPuzzleData = {
                imageData: finalUrl,
                pieceCount: parseInt(pieceCount, 10)
            };
            closeModal();
        } finally {
            // 5. ボタンのローディング表示を元に戻す
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
