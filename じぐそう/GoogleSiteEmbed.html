<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぐそう - 画像選択パネル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .container {
            width: 95%;
            max-width: 100%;
            background-color: #2d2d2d;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .gallery-title-area {
            border-bottom: 2px solid #3d3d3d;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .gallery-title-area label {
            font-size: 16px;
            font-weight: bold;
            color: #bbb;
        }
        .image-gallery {
            display: grid;
            /* 🌟 横幅を目一杯有効活用して、たくさんの画像をレスポンシブに綺麗に並べる */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .gallery-item {
            border: 2px solid transparent;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            background-color: #242424;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #555;
        }
        .gallery-item.selected {
            border-color: #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.4);
        }
        .gallery-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .gallery-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .gallery-info {
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #eee;
            background-color: #242424;
            border-top: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
            line-height: 1.5;
            border-top: 1px solid #3d3d3d;
            padding-top: 15px;
            width: 100%;
        }

        /* 🌟 詳細モーダルのスタイリング (背景白・広めの80%幅・2カラム) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background-color: #ffffff; /* 🌟 背景は完全な白 */
            color: #1e1e1e; /* 🌟 文字色は黒 */
            width: 90%; /* 🌟 画面幅の90%までダイナミックに拡大 */
            max-width: 1200px; /* 🌟 最大横幅も1200pxに拡張して画像表示を巨大化 */
            min-width: 320px;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 36px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #000;
        }

        /* 🌟 モーダル内の2カラムレイアウト */
        .modal-body {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .modal-body {
                flex-direction: column;
                gap: 20px;
            }
        }
        .modal-left {
            flex: 1.6; /* 🌟 左カラム（画像）の比率を大幅に引き上げて画像をダイナミックに拡大 */
            display: flex;
            flex-direction: column;
        }
        .modal-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            border-left: 1px solid #e0e0e0;
            padding-left: 40px;
        }
        @media (max-width: 768px) {
            .modal-right {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #e0e0e0;
                padding-top: 20px;
            }
        }

        .modal-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #f5f5f5;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        .modal-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #111;
        }
        .modal-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .genre-badge {
            background-color: #f0f0f0;
            color: #555;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #e2e2e2;
        }

        /* パズル設定とリーダーボード */
        .setting-label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }
        .modal-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fdfdfd;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .modal-select:focus {
            border-color: #4CAF50;
        }

        .modal-leaderboard {
            background-color: #fafafa;
            border: 1px solid #e6e6e6;
            border-radius: 10px;
            padding: 15px;
        }
        .leaderboard-title {
            font-size: 13px;
            font-weight: bold;
            color: #444;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .modal-leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .modal-leaderboard-table th {
            background-color: #eaeaea;
            color: #666;
            padding: 8px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        .modal-leaderboard-table td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .modal-action {
            margin-top: auto;
            padding-top: 10px;
        }

        /* 🌟 モーダル専用プレミアム開始ボタン */
        .modal-btn-start {
            background-color: #4CAF50;
            color: white;
            padding: 16px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            text-align: center;
            outline: none;
        }
        .modal-btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }
        .modal-btn-start:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }
        .modal-btn-start:disabled {
            background-color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 じぐそう - 画像選択</h2>
    
    <div class="gallery-title-area">
        <label>パズルにしたい画像を選んでください</label>
        
        <!-- 画像ギャラリー (初期状態はローカルの4枚画像で安全に構築) -->
        <div class="image-gallery" id="gallery">
            <div class="gallery-item" onclick="selectImage(this, 'images/beer1.jpg', 'ビール缶 1', 'ビール缶 1,飲み物')">
                <div class="gallery-image-wrap">
                    <img src="images/beer1.jpg" alt="ビール缶 1">
                </div>
                <div class="gallery-info">ビール缶 1</div>
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/beer2.jpg', 'ビール缶 2', 'ビール缶 2,飲み物')">
                <div class="gallery-image-wrap">
                    <img src="images/beer2.jpg" alt="ビール缶 2">
                </div>
                <div class="gallery-info">ビール缶 2</div>
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/beer3.jpg', 'ビール缶 3', 'ビール缶 3,飲み物')">
                <div class="gallery-image-wrap">
                    <img src="images/beer3.jpg" alt="ビール缶 3">
                </div>
                <div class="gallery-info">ビール缶 3</div>
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/berry.jpg', 'ベリー', 'ベリー,果物')">
                <div class="gallery-image-wrap">
                    <img src="images/berry.jpg" alt="ベリー">
                </div>
                <div class="gallery-info">ベリー</div>
            </div>
        </div>
    </div>

    <div class="info-text">
        ※ Googleドライブの画像を使用する場合、対象フォルダや画像を「リンクを知っている全員に閲覧可能」に設定してください。
    </div>
</div>

<!-- 🌟 プレミアム詳細モーダル (背景白・広めの80%幅・左右2カラム) -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        
        <div class="modal-body">
            <!-- 左カラム: プレビュー＆情報 -->
            <div class="modal-left">
                <div class="modal-image-wrap">
                    <img id="modalImg" src="" alt="プレビュー">
                </div>
                <div id="modalTitle" class="modal-title">パズル画像名</div>
                <div id="modalGenres" class="modal-genres">
                    <!-- 動的にジャンルバッジが挿入されます -->
                </div>
                <!-- 🌟 作成者とリンク表示エリアを追加 -->
                <div id="modalAuthorArea" style="margin-top: 15px; font-size: 13px; color: #555; border-top: 1px dashed #e0e0e0; padding-top: 12px; display: none;">
                    <div style="margin-bottom: 4px;">🎨 <strong>作成者:</strong> <span id="modalAuthor" style="font-weight: bold; color: #333;"></span></div>
                    <div id="modalLinkContainer" style="display: none;">🔗 <strong>リンク:</strong> <a id="modalLink" href="" target="_blank" style="color: #4CAF50; text-decoration: none; font-weight: bold;"></a></div>
                </div>
            </div>
            
            <!-- 右カラム: 設定＆リーダーボード＆アクション -->
            <div class="modal-right">
                <!-- 1. ピース数選択 -->
                <div>
                    <span class="setting-label">⚙️ 1. ピース数を選択</span>
                    <select id="pieceCount" class="modal-select">
                        <option value="24">24 ピース (かんたん)</option>
                        <option value="96" selected>96 ピース (ふつう)</option>
                        <option value="216">216 ピース (むずかしい)</option>
                        <option value="486">486 ピース (超むずかしい)</option>
                    </select>
                </div>
                
                <!-- 2. クリアタイム順位表 -->
                <div class="modal-leaderboard">
                    <p class="leaderboard-title">🏆 ⏱️ クリアタイム順位表</p>
                    <table class="modal-leaderboard-table">
                        <thead>
                            <tr>
                                <th>順位</th>
                                <th>プレイヤー</th>
                                <th>タイム</th>
                                <th>ピース</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align: center; color: #888; padding: 25px 0;">
                                    パズルをクリアすると、<br>ここにランキングが表示されます（準備中）
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 3. ゲーム開始アクション -->
                <div class="modal-action">
                    <button id="startBtn" class="modal-btn-start" onclick="sendToJigsaw()">パズルを開始する！</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 💡 デプロイ後に発行されるGASのWebアプリURLをここに貼り付けてください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzfLQy9O6Lq4mYxTnPZKlEVc4DpMsAgqqeFJrmZw2qnH_u3ul09q5gobOYqCW8AEJTP/exec"; 

    // デフォルト画像リスト (GASロード失敗時や未設定時のフォールバック用)
    const DEFAULT_IMAGES = [
        { id: 'images/beer1.jpg', name: 'ビール缶 1', description: 'ビール缶 1,飲み物' },
        { id: 'images/beer2.jpg', name: 'ビール缶 2', description: 'ビール缶 2,飲み物' },
        { id: 'images/beer3.jpg', name: 'ビール缶 3', description: 'ビール缶 3,飲み物' },
        { id: 'images/berry.jpg', name: 'ベリー', description: 'ベリー,果物' }
    ];

    let selectedImageUrl = 'images/beer1.jpg';
    let selectedImageName = 'ビール缶 1';
    let selectedImageDescription = 'ビール缶 1,飲み物';
    let selectedImageAuthor = 'Google AI画像生成 (Imagen 3)';
    let selectedImageLink = 'https://deepmind.google/technologies/imagen/';

    // 1. ページロード時にGASからドライブ内の画像一覧を自動取得してギャラリーを作る
    async function loadGalleryFromGAS() {
        const galleryContainer = document.getElementById('gallery');
        if (!GAS_API_URL) {
            console.log("GAS_API_URLが未設定です。ローカルのデフォルトアセットを使用します。");
            buildGallery(DEFAULT_IMAGES);
            return;
        }

        try {
            const response = await fetch(`${GAS_API_URL}?action=list`);
            const data = await response.json();
            
            if (data.success && data.images.length > 0) {
                buildGallery(data.images, true);
            } else {
                console.warn("GASから画像が取得できませんでした。デフォルトアセットを使用します。");
                buildGallery(DEFAULT_IMAGES);
            }
        } catch (error) {
            console.error("GASからの画像リスト取得中にエラーが発生しました。デフォルトアセットに切り替えます:", error);
            buildGallery(DEFAULT_IMAGES);
        }
    }

    // ギャラリーHTMLを動的構築するヘルパー
    function buildGallery(imagesList, isFromGAS = false) {
        const galleryContainer = document.getElementById('gallery');
        galleryContainer.innerHTML = ""; // 初期クリア
        
        imagesList.forEach((imgInfo, index) => {
            try {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                // ドライブ画像の場合は軽量サムネイルを使用し、ローカルの場合はパスをそのまま使用
                const thumbUrl = isFromGAS 
                    ? `https://drive.google.com/thumbnail?sz=w300&id=${imgInfo.id}`
                    : imgInfo.id;
                
                // 名前と説明のパース (極めて安全に処理)
                let name = imgInfo.name || '';
                let descriptionRaw = imgInfo.description || '';
                let description = '';
                let author = '';
                let link = '';
                
                if (descriptionRaw) {
                    // パイプ "|" で区切られているかチェック (名前,ジャンル1,ジャンル2|作成者|リンク)
                    if (descriptionRaw.includes('|')) {
                        const pipeParts = descriptionRaw.split('|');
                        description = pipeParts[0].trim();
                        if (pipeParts.length > 1) author = pipeParts[1].trim();
                        if (pipeParts.length > 2) link = pipeParts[2].trim();
                    } else {
                        description = descriptionRaw;
                    }
                }
                
                if (description) {
                    const parts = description.split(',');
                    if (parts.length > 0 && parts[0].trim()) {
                        name = parts[0].trim();
                    }
                } else {
                    // ドライブの説明（メタデータ）が空の場合、ファイル名から自動パースして補完
                    let nameWithoutExt = '';
                    if (name) {
                        const lastDotIndex = name.lastIndexOf('.');
                        nameWithoutExt = lastDotIndex !== -1 ? name.substring(0, lastDotIndex) : name;
                    }
                    if (!nameWithoutExt) nameWithoutExt = name || '名称未設定';

                    const separators = ['_', '-', ','];
                    let foundSeparator = false;
                    for (let sep of separators) {
                        if (nameWithoutExt.includes(sep)) {
                            const parts = nameWithoutExt.split(sep);
                            name = parts[0].trim();
                            // descriptionに「名前,ジャンル1,ジャンル2...」の形式で格納し、メタデータに偽装
                            description = parts.map(p => p.trim()).join(',');
                            foundSeparator = true;
                            break;
                        }
                    }
                    
                    if (!foundSeparator) {
                        // 区切り文字がない場合はファイル名全体を名前にし、descriptionもその名前単体にする
                        name = nameWithoutExt;
                        description = nameWithoutExt;
                    }
                }
                
                // 🌟 デフォルト作成者の設定 (すべての画像がAI生成画像とのことなので、未指定ならデフォルト表示)
                if (!author) {
                    author = "Google AI画像生成 (Imagen 3)";
                    link = "https://deepmind.google/technologies/imagen/";
                }
                
                item.innerHTML = `
                    <div class="gallery-image-wrap">
                        <img src="${thumbUrl}" alt="${name}">
                    </div>
                    <div class="gallery-info">${name}</div>
                `;
                
                // クリック時にモーダルを開く
                item.onclick = function() {
                    selectImage(this, imgInfo.id, name, description, author, link);
                };
                
                galleryContainer.appendChild(item);
                
                // 初期値をセット (モーダルはまだ開かない)
                if (index === 0) {
                    selectedImageUrl = imgInfo.id;
                    selectedImageName = name;
                    selectedImageDescription = description;
                    selectedImageAuthor = author;
                    selectedImageLink = link;
                }
            } catch (innerError) {
                console.error("個別画像のパース中にエラーが発生しました。スキップします:", imgInfo, innerError);
            }
        });
    }

    // ページロード時に自動ロードを実行
    window.addEventListener('DOMContentLoaded', loadGalleryFromGAS);

    // 画像選択時のコールバック
    function selectImage(element, url, name, description, author, link) {
        // ギャラリーの選択枠更新
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedImageUrl = url;
        selectedImageName = name;
        selectedImageDescription = description;
        selectedImageAuthor = author || '';
        selectedImageLink = link || '';

        // モーダルの準備と表示
        openModal(url, name, description, selectedImageAuthor, selectedImageLink);
    }

    // 詳細モーダルを開く
    function openModal(url, name, description, author, link) {
        const modal = document.getElementById('detailModal');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalGenres = document.getElementById('modalGenres');
        const modalAuthorArea = document.getElementById('modalAuthorArea');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalLinkContainer = document.getElementById('modalLinkContainer');
        const modalLink = document.getElementById('modalLink');

        // ドライブ画像の場合はプレビュー用に高解像度サムネイルを使用 (sz=w800など)
        let displayUrl = url;
        if (GAS_API_URL && url && !url.startsWith('http') && !url.includes('/')) {
            displayUrl = `https://drive.google.com/thumbnail?sz=w800&id=${url}`;
        }
        
        modalImg.src = displayUrl;
        modalTitle.innerText = name;
        
        // ジャンルの生成 (1番目が名前なので、2番目以降がジャンル)
        modalGenres.innerHTML = '';
        let genres = [];
        if (description) {
            const parts = description.split(',');
            if (parts.length > 1) {
                genres = parts.slice(1).map(g => g.trim());
            }
        }
        
        if (genres.length > 0) {
            genres.forEach(genre => {
                const badge = document.createElement('span');
                badge.className = 'genre-badge';
                badge.innerText = genre;
                modalGenres.appendChild(badge);
            });
        } else {
            const badge = document.createElement('span');
            badge.className = 'genre-badge';
            badge.innerText = '一般';
            modalGenres.appendChild(badge);
        }

        // 🌟 作成者と宣伝リンクのバインド
        if (author) {
            modalAuthor.innerText = author;
            modalAuthorArea.style.display = 'block';
            
            if (link) {
                modalLink.href = link;
                // ドメイン部分だけを抽出してすっきり表示
                let linkText = link;
                try {
                    const urlObj = new URL(link);
                    linkText = urlObj.hostname;
                } catch (e) {}
                modalLink.innerText = "公式サイト (" + linkText + ")";
                modalLinkContainer.style.display = 'block';
            } else {
                modalLinkContainer.style.display = 'none';
            }
        } else {
            modalAuthorArea.style.display = 'none';
        }

        modal.style.display = 'flex';
    }

    // 詳細モーダルを閉じる
    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    // モーダルの外側をクリックして閉じる
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    // パズル開始ボタン処理 (非同期でGAS経由でBase64をロードする)
    async function sendToJigsaw() {
        const pieceCount = document.getElementById('pieceCount').value;
        let finalUrl = selectedImageUrl;
        
        if (!finalUrl) {
            alert("画像が選択されていません。");
            return;
        }

        // 1. ボタンをローディング表示にして多重クリックを防止
        const btn = document.getElementById('startBtn');
        const originalText = btn.innerText;
        btn.innerText = "⏳ パズル画像を準備中...";
        btn.disabled = true;

        // 2. ポップアップブロックを完全に回避するため、即座にゲームプレイヤー画面を開く
        const playerWindow = window.open('jigsaw_player.html', '_blank');
        if (!playerWindow) {
            alert("ポップアップブロックが有効化されている可能性があります。別ウィンドウの許可をお願いします。");
            btn.innerText = originalText;
            btn.disabled = false;
            return;
        }

        // 親ウィンドウ側の共有変数をクリア
        window.selectedPuzzleData = null;

        try {
            let targetBase64 = null;
            
            // GAS経由での画像取得
            // GAS_API_URLが設定されていて、画像パスがURLではなく画像ID（英数字の長い文字列）である場合
            if (GAS_API_URL && finalUrl && !finalUrl.startsWith('http') && !finalUrl.includes('/')) {
                console.log("GASから安全にBase64画像データを取得します。ID:", finalUrl);
                const response = await fetch(`${GAS_API_URL}?action=image&id=${finalUrl}`);
                const resData = await response.json();
                if (resData.success) {
                    targetBase64 = resData.imageData;
                    console.log("GASからBase64画像データの取得に成功しました。");
                } else {
                    console.warn("GASからの画像取得に失敗しました:", resData.error);
                }
            }
            
            if (!targetBase64) {
                // デフォルト同居画像などのフォールバック
                targetBase64 = finalUrl;
            }

            // 3. データの準備完了！共有変数に確実に格納
            // 子ウィンドウがこの変数をポーリングで取得して自動的に進行します
            window.selectedPuzzleData = {
                imageData: targetBase64,
                pieceCount: parseInt(pieceCount, 10)
            };

            // 4. データ設定後、モーダルを閉じる
            closeModal();

        } catch (e) {
            console.error("画像データ取得処理中にエラーが発生しました:", e);
            // エラー時はフォールバックとして元のURLをそのまま渡す
            window.selectedPuzzleData = {
                imageData: finalUrl,
                pieceCount: parseInt(pieceCount, 10)
            };
            closeModal();
        } finally {
            // 5. ボタンのローディング表示を元に戻す
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
