<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぐそう - 画像選択パネル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            margin-top: 0;
            color: #4CAF50;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #3b3b3b;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .gallery-item {
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1;
            position: relative;
            background-color: #111;
        }
        .gallery-item.selected {
            border-color: #4CAF50;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 じぐそう - 画像選択</h2>
    
    <div class="form-group">
        <label>1. ピース数を選択</label>
        <select id="pieceCount">
            <option value="24">24 ピース (かんたん)</option>
            <option value="96" selected>96 ピース (ふつう)</option>
            <option value="216">216 ピース (むずかしい)</option>
            <option value="486">486 ピース (超むずかしい)</option>
        </select>
    </div>

    <div class="form-group">
        <label>2. 画像を選択</label>
        
        <!-- 画像ギャラリー (GitHub Pages内の同居画像に切り替え、CORSエラーを回避) -->
        <div class="image-gallery" id="gallery">
            <div class="gallery-item selected" onclick="selectImage(this, 'images/beer1.jpg')">
                <img src="images/beer1.jpg" alt="ビール缶 1">
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/beer2.jpg')">
                <img src="images/beer2.jpg" alt="ビール缶 2">
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/beer3.jpg')">
                <img src="images/beer3.jpg" alt="ビール缶 3">
            </div>
            <div class="gallery-item" onclick="selectImage(this, 'images/berry.jpg')">
                <img src="images/berry.jpg" alt="ベリー">
            </div>
        </div>

        <div style="margin-top: 15px;">
            <label>または直接URLを入力:</label>
            <input type="text" id="customUrl" placeholder="https://drive.google.com/uc?export=download&id=画像ID" oninput="clearGallerySelection()">
        </div>

        <div style="margin-top: 15px;">
            <label>または手元の画像ファイルを使用（CORSエラーなし）:</label>
            <input type="file" id="localFile" accept="image/*" onchange="handleLocalFile(event)" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444; background-color: #3b3b3b; color: white;">
        </div>
    </div>

    <button class="btn" onclick="sendToJigsaw()">パズルを開始する！</button>

    <div class="info-text">
        ※ Googleドライブの画像を使用する場合、画像を「リンクを知っている全員に閲覧可能」に設定した上で、直リンク用URL形式（<code>https://drive.google.com/uc?export=download&id=【画像ID】</code>）に変換して使用してください。手元の画像ファイルを選択した場合は、ブラウザ内で高速に読み込まれるため、CORSエラーを完全に回避できます。
    </div>
</div>

<script>
    // 💡 デプロイ後に発行されるGASのWebアプリURLをここに貼り付けてください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwMh3N2Zb-FOQ8h83tLdKaRGEvD-EmILLWwsNnHLAHn0vd3CqOii3CBsHoBiynwODnP/exec"; 

    let selectedImageUrl = 'images/beer1.jpg';
    let localImageBase64 = null; // ローカル選択ファイル用Base64データ
    let isLocalFileSelected = false;

    // 1. ページロード時にGASからドライブ内の画像一覧を自動取得してギャラリーを作る
    async function loadGalleryFromGAS() {
        const galleryContainer = document.getElementById('gallery');
        if (!GAS_API_URL) {
            console.log("GAS_API_URLが未設定です。ローカルのデフォルトアセットを使用します。");
            return;
        }
        galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #aaa; padding: 20px;'>ドライブから画像を読み込み中...</div>";

        try {
            const response = await fetch(`${GAS_API_URL}?action=list`);
            const data = await response.json();
            
            if (data.success && data.images.length > 0) {
                galleryContainer.innerHTML = ""; // 読み込み中表示をクリア
                
                data.images.forEach((imgInfo, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item' + (index === 0 ? ' selected' : '');
                    
                    // サムネイル画像はGoogleドライブの軽量サムネイルURLを使用 (CORS不要で表示可能)
                    const thumbUrl = `https://drive.google.com/thumbnail?sz=w200&id=${imgInfo.id}`;
                    item.innerHTML = `<img src="${thumbUrl}" alt="${imgInfo.name}">`;
                    
                    // クリック時に画像IDを選択状態にする
                    item.onclick = function() {
                        selectImage(this, imgInfo.id);
                    };
                    
                    galleryContainer.appendChild(item);
                    
                    // 初期選択状態として最初の画像を設定
                    if (index === 0) {
                        selectedImageUrl = imgInfo.id;
                    }
                });
            } else {
                galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #ff8888; padding: 20px;'>画像が見つかりませんでした。</div>";
            }
        } catch (error) {
            console.error("GASからの画像リスト取得に失敗しました:", error);
            galleryContainer.innerHTML = "<div style='grid-column: span 4; text-align: center; color: #ff8888; padding: 20px;'>ギャラリーの読み込みに失敗しました。</div>";
        }
    }

    // ページロード時に自動的にGASからロード
    window.addEventListener('DOMContentLoaded', loadGalleryFromGAS);

    function selectImage(element, url) {
        // 選択表示 of 切り替え
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        
        selectedImageUrl = url;
        document.getElementById('customUrl').value = ''; // カスタム入力をクリア
        document.getElementById('localFile').value = ''; // ローカルファイルをクリア
        localImageBase64 = null;
        isLocalFileSelected = false;
    }

    function clearGallerySelection() {
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => item.classList.remove('selected'));
        selectedImageUrl = '';
        document.getElementById('localFile').value = ''; // ローカルファイルをクリア
        localImageBase64 = null;
        isLocalFileSelected = false;
    }

    function handleLocalFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        // ギャラリーとカスタムURLの選択状態を解除
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => item.classList.remove('selected'));
        selectedImageUrl = '';
        document.getElementById('customUrl').value = '';

        const reader = new FileReader();
        reader.onload = function(e) {
            localImageBase64 = e.target.result;
            isLocalFileSelected = true;
            console.log("ローカル画像をBase64に変換しました。");
        };
        reader.onerror = function(err) {
            console.error("ローカルファイルの読み込みに失敗しました:", err);
            alert("画像の読み込みに失敗しました。");
        };
        reader.readAsDataURL(file);
    }

    // 外部URLの画像をJavaScript側でロードしBase64に変換するヘルパー (カスタムURL用のフォールバック)
    function convertUrlToBase64(imgUrl, callback) {
        if (!imgUrl) {
            callback(null);
            return;
        }

        const img = new Image();
        img.crossOrigin = 'Anonymous'; // CORS許可を要求
        img.onload = function() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const dataURL = canvas.toDataURL('image/png');
                callback(dataURL);
            } catch (e) {
                console.warn("キャンバスによるBase64変換に失敗しました（CORS制限等）: ", e);
                callback(imgUrl);
            }
        };
        img.onerror = function() {
            console.warn("画像のロードに失敗しました。元のURLのまま実行します:", imgUrl);
            callback(imgUrl);
        };
        img.src = imgUrl;
    }

    // パズル開始ボタン処理 (非同期でGAS経由でBase64をロードする)
    async function sendToJigsaw() {
        const pieceCount = document.getElementById('pieceCount').value;
        const customUrl = document.getElementById('customUrl').value.trim();
        
        let finalUrl = customUrl ? customUrl : selectedImageUrl;
        
        if (!finalUrl && !localImageBase64) {
            alert("画像が選択されていないか、URLが入力されていません。");
            return;
        }

        // 新しいゲーム起動画面をポップアップとして開く
        const playerWindow = window.open('jigsaw_player.html', '_blank');
        if (!playerWindow) {
            alert("ポップアップブロックが有効化されている可能性があります。別ウィンドウの許可をお願いします。");
            return;
        }

        // データの準備ができたら子ウィンドウへ渡すための共有変数を親側に確保する
        window.selectedPuzzleData = null;

        if (isLocalFileSelected && localImageBase64) {
            // ローカルファイルが選択されている場合は即座に共有変数を設定
            window.selectedPuzzleData = {
                imageData: localImageBase64,
                pieceCount: parseInt(pieceCount, 10)
            };
            console.log("ローカルのパズル用データが共有変数に設定されました。");
        } else {
            // GAS経由での画像取得、またはカスタムURLの処理
            try {
                let targetBase64 = null;
                
                // GAS_API_URLが設定されていて、画像パスがURLではなく画像ID（英数字の長い文字列）である場合
                if (GAS_API_URL && finalUrl && !finalUrl.startsWith('http') && !finalUrl.includes('/')) {
                    console.log("GASから安全にBase64画像データを取得します。ID:", finalUrl);
                    const response = await fetch(`${GAS_API_URL}?action=image&id=${finalUrl}`);
                    const resData = await response.json();
                    if (resData.success) {
                        targetBase64 = resData.imageData;
                        console.log("GASからBase64画像データの取得に成功しました。");
                    } else {
                        console.warn("GASからの画像取得に失敗しました:", resData.error);
                    }
                }
                
                if (targetBase64) {
                    window.selectedPuzzleData = {
                        imageData: targetBase64,
                        pieceCount: parseInt(pieceCount, 10)
                    };
                } else {
                    // GAS経由ではないカスタムURLなどの場合は従来の非同期CORS変換を試みる
                    convertUrlToBase64(finalUrl, function(base64OrUrl) {
                        window.selectedPuzzleData = {
                            imageData: base64OrUrl,
                            pieceCount: parseInt(pieceCount, 10)
                        };
                        console.log("外部URLのパズル用データが共有変数に設定されました。");
                    });
                }
            } catch (e) {
                console.error("画像データ取得処理中にエラーが発生しました:", e);
                // エラー時はフォールバックとして元のURLをそのまま渡す
                window.selectedPuzzleData = {
                    imageData: finalUrl,
                    pieceCount: parseInt(pieceCount, 10)
                };
            }
        }
    }
</script>
</body>
</html>
