<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じぐそう - 画像選択パネル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .container {
            width: 95%;
            max-width: 100%;
            background-color: #2d2d2d;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .gallery-title-area {
            border-bottom: 2px solid #3d3d3d;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .gallery-title-area label {
            font-size: 16px;
            font-weight: bold;
            color: #bbb;
        }
        .image-gallery {
            display: grid;
            /* 🌟 横幅を目一杯有効活用して、たくさんの画像をレスポンシブに綺麗に並べる */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .gallery-item {
            border: 2px solid transparent;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            background-color: #242424;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #555;
        }
        .gallery-item.selected {
            border-color: #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.4);
        }
        .gallery-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .gallery-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .gallery-info {
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #eee;
            background-color: #242424;
            border-top: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
            line-height: 1.5;
            border-top: 1px solid #3d3d3d;
            padding-top: 15px;
            width: 100%;
        }

        /* 🌟 詳細モーダルのスタイリング (背景白・広めの80%幅・2カラム) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: flex-start; /* 🌟 上寄せにして下が切れるのを防ぐ */
            padding: 20px; /* 🌟 画面端との余白を十分に確保してはみ出しを防ぐ */
            overflow-y: auto; /* 🌟 画面高さが足りない場合はモーダル自体をスクロール可能にする */
            z-index: 2000;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background-color: #ffffff; /* 🌟 背景は完全な白 */
            color: #1e1e1e; /* 🌟 文字色は黒 */
            width: 90%; /* 🌟 画面幅の90%までダイナミックに拡大 */
            max-width: 1000px; /* 🌟 最大横幅を1000pxに調整し、タブレットでもはみ出ないようにバランスを改善 */
            min-width: 280px;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            margin: 20px auto; /* 🌟 スクロール用上下マージン */
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (max-width: 1024px) {
            .modal-content {
                width: 95%;
                padding: 24px;
                border-radius: 20px;
            }
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 36px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 10;
        }
        .modal-close:hover {
            color: #000;
        }
 
        /* 🌟 モーダル内の2カラムレイアウト */
        .modal-body {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }
        @media (max-width: 1024px) {
            .modal-body {
                flex-direction: column;
                gap: 20px;
            }
        }
        .modal-left {
            flex: 1.5; /* 🌟 左カラム（画像）の比率を大幅に引き上げて画像をダイナミックに拡大 */
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .modal-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            border-left: 1px solid #e0e0e0;
            padding-left: 40px;
            min-width: 0;
        }
        @media (max-width: 1024px) {
            .modal-right {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #e0e0e0;
                padding-top: 20px;
                gap: 20px;
            }
        }
 
        .modal-image-wrap {
            width: 100%;
            aspect-ratio: 1.6;
            background-color: #f5f5f5;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        @media (max-width: 1024px) {
            .modal-image-wrap {
                max-height: 35vh; /* 🌟 縦並び時にプレビューが巨大化してボタンがはみ出さないように高さを制限 */
            }
        }
        .modal-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #111;
        }
        .modal-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .genre-badge {
            background-color: #f0f0f0;
            color: #555;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #e2e2e2;
        }

        /* パズル設定とリーダーボード */
        .setting-label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }
        .modal-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fdfdfd;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .modal-select:focus {
            border-color: #4CAF50;
        }

        .modal-leaderboard {
            background-color: #fafafa;
            border: 1px solid #e6e6e6;
            border-radius: 10px;
            padding: 15px;
        }
        .leaderboard-title {
            font-size: 13px;
            font-weight: bold;
            color: #444;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .modal-leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .modal-leaderboard-table th {
            background-color: #eaeaea;
            color: #666;
            padding: 8px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        .modal-leaderboard-table td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .modal-action {
            margin-top: auto;
            padding-top: 10px;
        }

        /* 🌟 モーダル専用プレミアム開始ボタン */
        .modal-btn-start {
            background-color: #4CAF50;
            color: white;
            padding: 16px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            text-align: center;
            outline: none;
        }
        .modal-btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }
        .modal-btn-start:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }
        .modal-btn-start:disabled {
            background-color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 じぐそう - 画像選択</h2>
    
    <!-- 👤 プレイヤー名入力欄（ランキング対象） -->
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background-color: #242424; padding: 12px 20px; border-radius: 10px; border: 1px solid #3d3d3d; width: 100%; box-sizing: border-box;">
        <label style="font-weight: bold; color: #4CAF50; font-size: 14px; white-space: nowrap;">👤 プレイヤー名：</label>
        <input type="text" id="playerNameInput" placeholder="名前を入力（ランキング対象）" maxlength="10" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #555; background-color: #1a1a1a; color: #fff; font-size: 13px; font-weight: bold; width: 180px; outline: none; transition: border-color 0.2s;">
        <span id="rankingStatus" style="font-size: 12px; font-weight: bold; color: #888; margin-left: 5px; transition: color 0.2s;">⚪ 匿名プレイ（ランキング対象外）</span>
    </div>

    <div class="gallery-title-area">
        <label>パズルにしたい画像を選んでください</label>
        
        <!-- 画像ギャラリー (ロード中は美しくプレースホルダーを表示) -->
        <div class="image-gallery" id="gallery">
            <div id="galleryPlaceholder" style="grid-column: 1 / -1; text-align: center; padding: 40px 0; color: #888;">
                <div style="border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #4CAF50; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                <div style="font-size: 14px; font-weight: bold; letter-spacing: 0.5px;">Googleドライブからパズル画像を読み込んでいます...</div>
            </div>
        </div>
    </div>

    <div class="info-text">
        ※ Googleドライブの画像を使用する場合、対象フォルダや画像を「リンクを知っている全員に閲覧可能」に設定してください。
    </div>
</div>

<!-- 🌟 プレミアム詳細モーダル (背景白・広めの80%幅・左右2カラム) -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        
        <div class="modal-body">
            <!-- 左カラム: プレビュー＆情報 -->
            <div class="modal-left">
                <div class="modal-image-wrap">
                    <img id="modalImg" src="" alt="プレビュー">
                </div>
                <div id="modalTitle" class="modal-title">パズル画像名</div>
                <div id="modalGenres" class="modal-genres">
                    <!-- 動的にジャンルバッジが挿入されます -->
                </div>
                <!-- 🌟 作成者とリンク表示エリアを追加 -->
                <div id="modalAuthorArea" style="margin-top: 15px; font-size: 13px; color: #555; border-top: 1px dashed #e0e0e0; padding-top: 12px; display: none;">
                    <div style="margin-bottom: 4px;">🎨 <strong>作成者:</strong> <span id="modalAuthor" style="font-weight: bold; color: #333;"></span></div>
                    <div id="modalLinkContainer" style="display: none;">🔗 <strong>リンク:</strong> <a id="modalLink" href="" target="_blank" style="color: #4CAF50; text-decoration: none; font-weight: bold;"></a></div>
                </div>
            </div>
            
            <!-- 右カラム: 設定＆リーダーボード＆アクション -->
            <div class="modal-right">
                <!-- 1. ピース数選択 -->
                <div>
                    <span class="setting-label">⚙️ 1. ピース数を選択</span>
                    <select id="pieceCount" class="modal-select">
                        <option value="24">24 ピース (かんたん)</option>
                        <option value="96" selected>96 ピース (ふつう)</option>
                        <option value="216">216 ピース (むずかしい)</option>
                        <option value="486">486 ピース (超むずかしい)</option>
                    </select>
                </div>
                
                <!-- 2. クリアタイム順位表 -->
                <div class="modal-leaderboard">
                    <p class="leaderboard-title">🏆 ⏱️ クリアタイム順位表</p>
                    <table class="modal-leaderboard-table">
                        <thead>
                            <tr>
                                <th>順位</th>
                                <th>プレイヤー</th>
                                <th>タイム</th>
                                <th>ピース</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align: center; color: #888; padding: 25px 0;">
                                    パズルをクリアすると、<br>ここにランキングが表示されます（準備中）
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 3. ゲーム開始アクション -->
                <div class="modal-action">
                    <button id="startBtn" class="modal-btn-start" onclick="sendToJigsaw()">パズルを開始する！</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 💾 ロード用スロット選択モーダル -->
<div class="modal-overlay" id="loadModal" style="display: none;">
    <div class="modal-content" style="max-width: 500px; padding: 30px; background: rgba(30, 30, 38, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #fff;">
        <span class="modal-close" onclick="closeLoadModal()" style="color: #aaa;">&times;</span>
        <h3 style="margin-top: 0; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; color: #FFD700;">💾 セーブスロットを選択してください</h3>
        <div id="loadSlotsContainer" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <!-- JavaScriptでスロット要素が動的に挿入されます -->
        </div>
    </div>
</div>

<script>
    // 💡 デプロイ後に発行されるGASのWebアプリURLをここに貼り付けてください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzfLQy9O6Lq4mYxTnPZKlEVc4DpMsAgqqeFJrmZw2qnH_u3ul09q5gobOYqCW8AEJTP/exec"; 

    // 💡 新しく作成したランキング用スプレッドシートのApps Scriptから発行されたWebアプリURLをここに貼り付けてください
    const RANKING_API_URL = "https://script.google.com/macros/s/AKfycbzdxT5WjCue0naHSs12X2Di_y9_DcW6gLqFb3X6UvwoZVWlZPqfPL7-K7cql2gCQucz/exec";

    // 💡 本番環境（Googleサイトなどの埋め込み環境）で公開している jigsaw_player.html の絶対URL
    // ※ Googleサイトに埋め込んでプレイする場合、この変数に公開されている jigsaw_player ページの絶対URL（https://...）を設定してください。
    // ※ 空欄または "jigsaw_player.html" の場合は、ローカルテスト用として相対パスで起動します。
    const PUBLISHED_PLAYER_URL = "https://fumiakinx.github.io/jigsaw/Builds/jigsaw_player.html"; 

    // デフォルト画像リスト (GASロード失敗時や未設定時のフォールバック用)
    const DEFAULT_IMAGES = [
        { id: '16lD6cYeC8xc7mgMh-0tIe7J27Nv3N10K', name: '日本のビール', description: '日本のビール,飲み物,缶|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1IpPrnbfpXlDU5U4_S1pqbn5Yl7EwkAih', name: '日本のビール', description: '日本のビール,飲み物,缶|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '17ehA-dLd30wboSgO7qSQfIz0fkiG4cr-', name: 'トヨタ 2000GT', description: 'トヨタ 2000GT,車,サーキットの狼,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1UeqknDR9xAMnuLfP1xqQX7DHWvuNgtIA', name: 'ディーノ 246GT', description: 'ディーノ 246GT,車,サーキットの狼,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1UnfSiKB-nZE-ky4IRQp7zL_dNgzlgc9p', name: 'ロータス ヨーロッパ', description: 'ロータス ヨーロッパ,車,サーキットの狼,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1t9OjMlc8uyzjx5ThLFr0TV4yNHrOK6me', name: 'ポルシェ 911カレラRS', description: 'ポルシェ 911カレラRS,車,サーキットの狼,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1M-k7YBPfz7Tik_FODePIqH7H6csaRNWI', name: '紫電改', description: '紫電改,飛行機,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1jHSGWe4fcrguLWekEvmk8VtNW7yAcL0i', name: '震電', description: '震電,飛行機,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1FoXrZ8e1ox-Nppcq1zMyVcDrXoxR6LT4', name: '零式艦上戦闘機', description: '零式艦上戦闘機,飛行機,ボックスアート|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1qX6zU1NnxIjUHx48G0Z0GbLGudKRacTI', name: '昭和のお菓子', description: '昭和のお菓子,昭和,お菓子|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1zkJSYPG2vZ4sq9pOu8ssgYRLZy3pj6T1', name: '日本のビール', description: '日本のビール,飲み物,缶|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '13lKZZnghkVJEkbh-1JwHb7GetKbGWvaz', name: 'ドーナツ', description: 'ドーナツ,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '145SPy2TKIWzd9AeiSIc_0tBpPZkiMDEy', name: 'ドーナツ', description: 'ドーナツ,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1nimiWLzN19mxZO4hDbt8dYxbZlFv9Cua', name: 'ドーナツ', description: 'ドーナツ,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1g3KQBjFDuAgjqvXqdxU7Ba6QjkQuHh3g', name: 'ベリー', description: 'ベリー,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1uEXOZmhN3kFfVQZ8SoG11wmY3lHaMoq8', name: 'ケーキ', description: 'ケーキ,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' },
        { id: '1bD-rtuhi4MNuFhplO6ZZ_0uGVvsyvobY', name: 'フルーツ', description: 'フルーツ,食べ物|Google AI画像生成 (Imagen 3)|https://deepmind.google/technologies/imagen/' }
    ];

    let selectedImageUrl = '16lD6cYeC8xc7mgMh-0tIe7J27Nv3N10K';
    let selectedImageName = '日本のビール';
    let selectedImageDescription = '日本のビール,飲み物,缶';
    let selectedImageAuthor = 'Google AI画像生成 (Imagen 3)';
    let selectedImageLink = 'https://deepmind.google/technologies/imagen/';

    // 1. ページロード時にGASからドライブ内の画像一覧を自動取得してギャラリーを作る
    async function loadGalleryFromGAS() {
        const galleryContainer = document.getElementById('gallery');
        if (!GAS_API_URL) {
            console.log("GAS_API_URLが未設定です。ローカルのデフォルトアセットを使用します。");
            buildGallery(DEFAULT_IMAGES);
            return;
        }

        try {
            const response = await fetch(`${GAS_API_URL}?action=list`);
            const data = await response.json();
            
            if (data.success && data.images.length > 0) {
                buildGallery(data.images, true);
            } else {
                console.warn("GASから画像が取得できませんでした。デフォルトアセットを使用します。");
                buildGallery(DEFAULT_IMAGES);
            }
        } catch (error) {

    // ギャラリーHTMLを動的構築するヘルパー
    function buildGallery(imagesList, isFromGAS = false) {
        const galleryContainer = document.getElementById('gallery');
        galleryContainer.innerHTML = ""; // 初期クリア
        
        imagesList.forEach((imgInfo, index) => {
            try {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                // ドライブ画像の場合は軽量サムネイルを使用し、ローカルの場合はパスをそのまま使用
                const thumbUrl = isFromGAS 
                    ? `https://drive.google.com/thumbnail?sz=w300&id=${imgInfo.id}`
                    : imgInfo.id;
                
                // 名前と説明のパース (極めて安全に処理)
                let name = imgInfo.name || '';
                let descriptionRaw = imgInfo.description || '';
                let description = '';
                let author = '';
                let link = '';
                
                if (descriptionRaw) {
                    // パイプ "|" で区切られているかチェック (名前,ジャンル1,ジャンル2|作成者|リンク)
                    if (descriptionRaw.includes('|')) {
                        const pipeParts = descriptionRaw.split('|');
                        description = pipeParts[0].trim();
                        if (pipeParts.length > 1) author = pipeParts[1].trim();
                        if (pipeParts.length > 2) link = pipeParts[2].trim();
                    } else {
                        description = descriptionRaw;
                    }
                }
                
                if (description) {
                    const parts = description.split(',');
                    if (parts.length > 0 && parts[0].trim()) {
                        name = parts[0].trim();
                    }
                } else {
                    // ドライブの説明（メタデータ）が空の場合、ファイル名から自動パースして補完
                    let nameWithoutExt = '';
                    if (name) {
                        const lastDotIndex = name.lastIndexOf('.');
                        nameWithoutExt = lastDotIndex !== -1 ? name.substring(0, lastDotIndex) : name;
                    }
                    if (!nameWithoutExt) nameWithoutExt = name || '名称未設定';

                    const separators = ['_', '-', ','];
                    let foundSeparator = false;
                    for (let sep of separators) {
                        if (nameWithoutExt.includes(sep)) {
                            const parts = nameWithoutExt.split(sep);
                            name = parts[0].trim();
                            // descriptionに「名前,ジャンル1,ジャンル2...」の形式で格納し、メタデータに偽装
                            description = parts.map(p => p.trim()).join(',');
                            foundSeparator = true;
                            break;
                        }
                    }
                    
                    if (!foundSeparator) {
                        // 区切り文字がない場合はファイル名全体を名前にし、descriptionもその名前単体にする
                        name = nameWithoutExt;
                        description = nameWithoutExt;
                    }
                }
                
                // 🌟 デフォルト作成者の設定 (すべての画像がAI生成画像とのことなので、未指定ならデフォルト表示)
                if (!author) {
                    author = "Google AI画像生成 (Imagen 3)";
                    link = "https://deepmind.google/technologies/imagen/";
                }
                
                item.innerHTML = `
                    <div class="gallery-image-wrap">
                        <img src="${thumbUrl}" alt="${name}">
                    </div>
                    <div class="gallery-info">${name}</div>
                `;
                
                // クリック時にモーダルを開く
                item.onclick = function() {
                    selectImage(this, imgInfo.id, name, description, author, link);
                };
                
                galleryContainer.appendChild(item);
                
                // 初期値をセット (モーダルはまだ開かない)
                if (index === 0) {
                    selectedImageUrl = imgInfo.id;
                    selectedImageName = name;
                    selectedImageDescription = description;
                    selectedImageAuthor = author;
                    selectedImageLink = link;
                }
            } catch (innerError) {
                console.error("個別画像のパース中にエラーが発生しました。スキップします:", imgInfo, innerError);
            }
        });
        
        // GASからセーブスロット情報を取得して、セーブカードを画像一覧の左上に非同期で挿入する [NEW]
        const currentName = document.getElementById('playerNameInput').value.trim();
        if (currentName) {
            injectSaveCardsToGallery(galleryContainer, currentName);
        }
    }

    // 超高精度モバイル・タブレット端末判定 (Fire HD カスタム環境・iPad Pro PC偽装モード・物理タッチ端末完全対応)
    function isMobileOrTablet() {
        const ua = navigator.userAgent.toLowerCase();
        
        // 1. 標準判定 (iOS, Android, Fireシリーズ, Silk, Amazon, Fire)
        const isMobileUA = /iphone|ipod|android.*mobile|windows.*phone|blackberry|iemobile|opera mini/i.test(ua);
        const isTabletUA = /ipad|android(?!.*mobile)|kftt|kindle|silk|amazon|fire/i.test(ua);
        
        if (isMobileUA || isTabletUA) return true;

        // 2. iPad Pro等のPC偽装対策 (Mac表示だがマルチタッチ対応)
        const isMacTouch = navigator.maxTouchPoints > 1 && ua.includes('macintosh');
        if (isMacTouch) return true;

        // 3. 🌟 最強の物理特性フォールバック (Fire HD 10「2021改」等のPC偽装ブラウザ対策)
        // デバイスが「物理的にタッチ可能」であり、かつ「画面幅または画面高さが1300px以下（高解像度タブレットサイズ）」の場合
        // ※ Fire HD 10 (1920x1200) の横画面論理ピクセル幅 (1280px) などをカバーするため 1300px に引き上げました
        const hasTouchPoints = (navigator.maxTouchPoints && navigator.maxTouchPoints > 0) || ('ontouchstart' in window);
        const isTabletOrPhoneSize = window.innerWidth <= 1300 || window.innerHeight <= 1300;
        
        if (hasTouchPoints && isTabletOrPhoneSize) {
            console.log("📱 物理特性によりタブレット/モバイルとして判定しました（タッチ対応 ＆ 1024px以下）");
            return true;
        }

        return false;
    }

    // ⏱️ GASから現在のパズルのランキング（上位5件）を取得して表示する
    async function loadLeaderboard(imageId, pieceCount) {
        const tbody = document.querySelector('.modal-leaderboard-table tbody');
        if (!tbody) return;
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888; padding: 25px 0;">⏱️ ランキングを読み込み中...</td></tr>`;

        if (!RANKING_API_URL || RANKING_API_URL.includes("_XXX")) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888; padding: 25px 0;">ランキング用のGASのURLが未設定です。</td></tr>`;
            return;
        }

        try {
            const response = await fetch(`${RANKING_API_URL}?action=get_leaderboard&id=${imageId}&pieceCount=${pieceCount}`);
            const resData = await response.json();

            if (resData.success && resData.leaderboard && resData.leaderboard.length > 0) {
                tbody.innerHTML = "";
                resData.leaderboard.forEach((row, idx) => {
                    const tr = document.createElement('tr');
                    
                    // 自分の名前だった場合は行をハイライトする
                    const currentName = document.getElementById('playerNameInput').value.trim();
                    if (currentName && row.name === currentName) {
                        tr.style.backgroundColor = 'rgba(76, 175, 80, 0.15)';
                        tr.style.fontWeight = 'bold';
                    }
                    
                    // タイムを分:秒のフォーマットに変換
                    const minutes = Math.floor(row.time / 60);
                    const seconds = Math.floor(row.time % 60);
                    const formattedTime = `${minutes}:${seconds.toString().padStart(2, '0')}`;

                    tr.innerHTML = `
                        <td style="font-weight: bold; color: ${idx === 0 ? '#FFD700' : (idx === 1 ? '#C0C0C0' : (idx === 2 ? '#CD7F32' : '#888'))};">${idx + 1}位</td>
                        <td>${row.name}</td>
                        <td style="font-weight: bold;">${formattedTime}</td>
                        <td>${row.pieceCount}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888; padding: 25px 0;">この設定でのクリアタイム記録は<br>まだありません。最初のランクインを目指そう！</td></tr>`;
            }
        } catch (error) {
            console.error("ランキング取得中にエラーが発生しました:", error);
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ff6b6b; padding: 25px 0;">⚠️ ランキングの取得に失敗しました。</td></tr>`;
        }
    }

        if (!confirm(`${slotName} のセーブデータ（${displayName}）を削除しますか？`)) {

            // 空データを送信することで、GAS側のセーブスロットを初期化（消去）する
            const deleteParams = new URLSearchParams();
            deleteParams.append("action", "save_game");
            deleteParams.append("playerName", playerName);
            deleteParams.append("slotIndex", slotIndex.toString());

            deleteParams.append("saveTime", "");
            deleteParams.append("imageName", "");

        try {
            console.log(`[GAS-SaveCard] ギャラリー用のセーブカードをGASから取得します。名: ${playerName}`);
            const response = await fetch(`${RANKING_API_URL}?action=get_slots&playerName=${encodeURIComponent(playerName)}`);
            const resData = await response.json();
            
            if (resData.success && resData.slots) {
                // オートセーブ（0）および通常スロット（1〜3）を走査
                for (let i = 0; i <= 3; i++) {
                    const slot = resData.slots[i.toString()];
                    if (slot) {
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.style.borderColor = "#FFD700"; // 全セーブカードは高級ゴールド枠
                        item.style.borderWidth = "2px";
                        item.style.boxShadow = "0 0 15px rgba(255, 215, 0, 0.25)";
                        
                        const thumbId = `save-thumb-${i}`;
                        const displayName = slot.imageName;
                        const isAutosave = (i === 0);
                        const badgeText = isAutosave ? "🔄 オートセーブ" : `💾 セーブ ${i}`;
                        
                        item.innerHTML = `
                            <div class="gallery-image-wrap" style="position: relative; width: 100%; height: 120px; overflow: hidden; border-radius: 8px; background: #1a1a24;">
                                <img id="${thumbId}" src="images/save_thumbnail_default.png" alt="${displayName}" style="object-fit: cover; width: 100%; height: 100%; opacity: 0.5;">
                                <div style="position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.85); color: #FFD700; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid #FFD700; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">${badgeText}</div>
                                <!-- 🔴 右上の赤いゴミ箱削除ボタン -->
                                <button class="delete-save-btn" style="position: absolute; top: 8px; right: 8px; background: rgba(220, 53, 69, 0.9); color: white; border: none; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 13px; z-index: 10; transition: background 0.2s;" onmouseover="this.style.background='#c82333'" onmouseout="this.style.background='rgba(220, 53, 69, 0.9)'" onclick="event.stopPropagation(); deleteSaveSlot(${i}, '${displayName}');">🗑</button>
                            </div>
                            <div class="gallery-info" style="color: #FFD700; font-weight: bold; padding: 12px 10px; text-align: center;">
                                ${displayName}
                                <div style="font-size: 10px; color: rgba(255,255,255,0.6); font-weight: normal; margin-top: 5px;">${slot.saveTime}</div>
                            </div>
                        `;
                        
                        // 非同期でサムネイル画像をGASから取得してロードする処理 (スクリーンショット復活！)
                        fetch(`${RANKING_API_URL}?action=load_game&playerName=${encodeURIComponent(playerName)}&slotIndex=${i}`)
                            .then(res => res.json())
                            .then(data => {
                                if (data.success && data.saveDataJson) {
                                    const dec = decryptSaveData(data.saveDataJson);
                                    if (dec) {
                                        try {
                                            const saveData = JSON.parse(dec);
                                            const imgEl = document.getElementById(thumbId);
                                            if (imgEl && saveData.screenshotBase64) {
                                                imgEl.src = "data:image/jpeg;base64," + saveData.screenshotBase64;
                                                imgEl.style.opacity = "1.0"; // ロード成功したら不透明度を戻す
                                            }
                                        } catch(err) {}
                                    }
                                }
                            });
                        
                        item.onclick = function() {
                            const slotLabel = isAutosave ? "オートセーブ" : `スロット ${i}`;
                            if (confirm(`${slotLabel} のセーブデータ（${displayName}）から再開しますか？`)) {
                                let playerUrl = 'jigsaw_player.html';
                                const isLocal = window.location.protocol === 'file:' || 
                                                window.location.hostname === 'localhost' || 
                                                window.location.hostname === '127.0.0.1';
                                
                                if (!isLocal && typeof PUBLISHED_PLAYER_URL !== 'undefined' && PUBLISHED_PLAYER_URL && PUBLISHED_PLAYER_URL.startsWith('http')) {
                                    playerUrl = PUBLISHED_PLAYER_URL;
                                }
                                
                                const loadUrl = `${playerUrl}?isSaveLoad=true&slotIndex=${i}&playerName=${encodeURIComponent(playerName)}&rankingApiUrl=${encodeURIComponent(RANKING_API_URL)}`;
                                console.log(`🌐 大画面（新タブ）でゴールドセーブカード（${slotLabel}）からロード起動します:`, loadUrl);
                                const playerWindow = window.open(loadUrl, '_blank');
                                if (!playerWindow) {
                                    alert("ポップアップブロックが有効化されている可能性があります。別タブでの起動を許可してください。");
                                }
                            }
                        };
                        
                        // ギャラリーの先頭（左上）にゴールドカードを挿入
                        galleryContainer.insertBefore(item, galleryContainer.firstChild);
                    }
                }
            }
        } catch(e) {
            console.error("セーブカード構築エラー:", e);
        }
    }
</script>
</body>
</html>
